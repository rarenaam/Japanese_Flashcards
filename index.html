<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanse Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="filter-menu">
            <select id="category-select">
                <option value="alle">Alle Categorieën</option>
            </select>
        </div>

        <div id="card" class="card">
            <div class="card-inner">
                <div class="card-front">
                    <h1 id="jp-word">Laden...</h1>
                    <p id="word-type"></p>
                </div>
                <div class="card-back">
                    <h2 id="nl-meaning">...</h2>
                    <p id="romaji-text"></p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-red">Nog niet</button>
            <button class="btn-green">Ken ik!</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
